<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 50px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        #movieInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #movieInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #recommendBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #recommendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #recommendBtn:active {
            transform: translateY(0);
        }

        #recommendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            margin: 20px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .recommendations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .movie-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-card h3 {
            font-size: 1.1em;
            word-wrap: break-word;
        }

        .movie-number {
            font-size: 2em;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Movie Recommender</h1>
        <p class="subtitle">Discover movies you'll love</p>

        <div class="search-section">
            <input 
                type="text" 
                id="movieInput" 
                placeholder="Enter a movie name (e.g., Avatar, The Dark Knight)..."
                onkeypress="handleKeyPress(event)"
            >
            <button id="recommendBtn" onclick="getRecommendations()">Recommend</button>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                getRecommendations();
            }
        }

        async function getRecommendations() {
            const movieName = document.getElementById('movieInput').value.trim();
            const resultsContainer = document.getElementById('resultsContainer');

            if (!movieName) {
                resultsContainer.innerHTML = '<div class="error">Please enter a movie name</div>';
                return;
            }

            // Show loading state
            document.getElementById('recommendBtn').disabled = true;
            resultsContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Finding recommendations...
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE_URL}/recommend`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        movie: movieName,
                        num_recommendations: 5
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    displayRecommendations(data);
                } else {
                    resultsContainer.innerHTML = `<div class="error">❌ ${data.error || 'Error getting recommendations'}</div>`;
                }
            } catch (error) {
                resultsContainer.innerHTML = `<div class="error">❌ Connection error. Please check the API status.</div>`;
                console.error('Error:', error);
            } finally {
                document.getElementById('recommendBtn').disabled = false;
            }
        }

        function displayRecommendations(data) {
            const resultsContainer = document.getElementById('resultsContainer');
            const recommendations = data.recommendations || [];

            if (recommendations.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="error">No recommendations found for "${data.movie}"</div>
                `;
                return;
            }

            let html = `
                <h2 style="text-align: center; color: #333; margin-bottom: 20px;">
                    Recommendations for: <strong style="color: #667eea;">${data.movie}</strong>
                </h2>
                <div class="recommendations">
            `;

            recommendations.forEach((movie, index) => {
                html += `
                    <div class="movie-card">
                        <div class="movie-number">#${index + 1}</div>
                        <h3>${movie}</h3>
                    </div>
                `;
            });

            html += `</div>`;
            resultsContainer.innerHTML = html;
        }

        // Show initial state
        window.addEventListener('load', () => {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = `
                <div class="empty-state">
                    <p>🔍 Enter a movie name and click "Recommend" to get started!</p>
                </div>
            `;
        });
    </script>
</body>
</html>
